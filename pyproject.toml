[project]
name = "neossat-astronomy-image-analysis"
version = "0.1.0"
description = "Tools for NEOSSat astronomy image analysis and processing"
readme = "README.md"
requires-python = ">=3.8"

authors = [
    { name = "" }
]

dependencies = [
    "astropy==6.0.1",
    "photutils==1.12.0",
    "numpy==1.26.4",
    "matplotlib==3.8.4",
    "fastapi==0.110.0",
    "uvicorn[standard]==0.29.0",
    "pydantic==2.6.4"
]

[project.optional-dependencies]
dev = [
    "black",
    "isort",
    "flake8",
    "pytest"
]

[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
