[project]
name = "simple-fits-tool"
version = "0.1.0"
description = "A cross-platform tool to download and visualize FITS images."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "PyQt6",
    "requests",
    "astropy",
    "matplotlib",
    "numpy",
    "astroquery",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
