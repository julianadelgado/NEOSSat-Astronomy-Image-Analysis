[project]
name = "NEOSSat-Astronomy-Image-Analysis"
version = "0.1.0"
description = "Tools for NEOSSat astronomy image analysis"
authors = [ { name = "" } ]
readme = "README.md"
requires-python = ">=3.8"

[project.optional-dependencies]
dev = [
    "black",
    "isort",
    "flake8",
    "pytest"
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"
